app = "signal-server"
primary_region = "lhr"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DATABASE_URL = "/data/signal.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "signal_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
